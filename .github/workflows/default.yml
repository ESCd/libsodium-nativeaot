name: default

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
  workflow_dispatch:

env:
  ARTIFACT_DIR: ${{ github.workspace }}/dist
  DOTNET_NOLOGO: true
  MACOSX_DEPLOYMENT_TARGET: "12.0"
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages
  SODIUM_CHECKSUM: "9e4285c7a419e82dedb0be63a72eea357d6943bc3e28e6735bf600dd4883feaf"
  SODIUM_VERSION: "1.0.21"

jobs:
  build-linux-native:
    name: build (${{ matrix.rid }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: linux-x64
            runner: ubuntu-24.04
            host: ""
            cflags: "-O2 -march=x86-64"

          - rid: linux-arm64
            runner: ubuntu-24.04-arm
            host: ""
            cflags: "-O2"

    steps:
      - name: download source
        run: |
          curl -fsSL "https://github.com/jedisct1/libsodium/releases/download/${{ env.SODIUM_VERSION }}-RELEASE/libsodium-${{ env.SODIUM_VERSION }}.tar.gz" -o libsodium.tar.gz
          echo "${{ env.SODIUM_CHECKSUM }}  libsodium.tar.gz" | shasum -a 256 --check
          tar -xzf libsodium.tar.gz
          mv libsodium-${{ env.SODIUM_VERSION }} sodium-src

      - name: build shared
        run: |
          mkdir build-shared && cd build-shared
          ../sodium-src/configure \
            --enable-shared --disable-static \
            ${{ matrix.host && format('--host={0}', matrix.host) || '' }} \
            CFLAGS="${{ matrix.cflags }}"
          make -j$(nproc)

      - name: build static
        run: |
          mkdir build-static && cd build-static
          ../sodium-src/configure \
            --disable-shared --enable-static \
            ${{ matrix.host && format('--host={0}', matrix.host) || '' }} \
            CFLAGS="${{ matrix.cflags }}"
          make -j$(nproc)

      - name: prepare artifact
        run: |
          mkdir -p "${{ env.ARTIFACT_DIR }}/bin" "${{ env.ARTIFACT_DIR }}/lib"
          cp build-shared/src/libsodium/.libs/libsodium.so.* "${{ env.ARTIFACT_DIR }}/bin/libsodium.so"
          cp build-static/src/libsodium/.libs/libsodium.a "${{ env.ARTIFACT_DIR }}/lib/libsodium.a"

      - uses: actions/upload-artifact@v7
        with:
          name: libsodium-${{ matrix.rid }}
          path: ${{ env.ARTIFACT_DIR }}

  build-linux-arm:
    name: build (linux-arm)
    runs-on: ubuntu-24.04
    steps:
      - uses: docker/setup-qemu-action@v4

      - name: download source
        run: |
          curl -fsSL "https://github.com/jedisct1/libsodium/releases/download/${{ env.SODIUM_VERSION }}-RELEASE/libsodium-${{ env.SODIUM_VERSION }}.tar.gz" -o libsodium.tar.gz
          echo "${{ env.SODIUM_CHECKSUM }}  libsodium.tar.gz" | shasum -a 256 --check
          tar -xzf libsodium.tar.gz
          mv libsodium-${{ env.SODIUM_VERSION }} sodium-src

      - name: build (shared + static)
        run: |
          docker run --rm --platform linux/arm/v7 \
            -v "$PWD/sodium-src:/sodium-src" \
            -v "$PWD/dist:/dist" \
            arm32v7/ubuntu:24.04 sh -c '
              apt-get update -qq
              apt-get install -y --no-install-recommends build-essential
              cd /sodium-src

              # shared
              mkdir build-shared && cd build-shared
              ../configure --enable-shared --disable-static CFLAGS="-O2"
              make -j$(nproc)
              cd ..

              # static
              mkdir build-static && cd build-static
              ../configure --disable-shared --enable-static CFLAGS="-O2"
              make -j$(nproc)
              cd ..

              mkdir -p /dist/bin /dist/lib
              cp build-shared/src/libsodium/.libs/libsodium.so.* /dist/bin/libsodium.so
              cp build-static/src/libsodium/.libs/libsodium.a /dist/lib/libsodium.a
            '

      - uses: actions/upload-artifact@v7
        with:
          name: libsodium-linux-arm
          path: dist

  build-linux-musl:
    name: build (${{ matrix.rid }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: linux-musl-x64
            runner: ubuntu-24.04
            platform: linux/amd64
            image: alpine:3.21
            qemu: false

          - rid: linux-musl-arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
            image: alpine:3.21
            qemu: false

          - rid: linux-musl-arm
            runner: ubuntu-24.04
            platform: linux/arm/v7
            image: arm32v7/alpine:3.21
            qemu: true

    steps:
      - uses: docker/setup-qemu-action@v4
        if: matrix.qemu

      - name: download source
        run: |
          curl -fsSL "https://github.com/jedisct1/libsodium/releases/download/${{ env.SODIUM_VERSION }}-RELEASE/libsodium-${{ env.SODIUM_VERSION }}.tar.gz" -o libsodium.tar.gz
          echo "${{ env.SODIUM_CHECKSUM }}  libsodium.tar.gz" | shasum -a 256 --check
          tar -xzf libsodium.tar.gz
          mv libsodium-${{ env.SODIUM_VERSION }} sodium-src

      - name: build (shared + static)
        run: |
          docker run --rm --platform ${{ matrix.platform }} \
            -v "$PWD/sodium-src:/sodium-src" \
            -v "$PWD/dist:/dist" \
            ${{ matrix.image }} sh -c '
              apk add --no-cache build-base
              cd /sodium-src

              mkdir build-shared && cd build-shared
              ../configure --enable-shared --disable-static CFLAGS="-O2"
              make -j$(nproc)
              cd ..

              mkdir build-static && cd build-static
              ../configure --disable-shared --enable-static CFLAGS="-O2"
              make -j$(nproc)
              cd ..

              mkdir -p /dist/bin /dist/lib
              cp build-shared/src/libsodium/.libs/libsodium.so.* /dist/bin/libsodium.so
              cp build-static/src/libsodium/.libs/libsodium.a /dist/lib/libsodium.a
            '

      - uses: actions/upload-artifact@v7
        with:
          name: libsodium-${{ matrix.rid }}
          path: dist

  build-macos:
    name: build (${{ matrix.rid }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: osx-arm64
            runner: macos-26
            cflags: "-O2 -mmacosx-version-min=12.0"
            ldflags: "-mmacosx-version-min=12.0"

          - rid: osx-x64
            runner: macos-26-intel
            cflags: "-O2 -mmacosx-version-min=12.0"
            ldflags: "-mmacosx-version-min=12.0"

    steps:
      - name: download source
        run: |
          curl -fsSL "https://github.com/jedisct1/libsodium/releases/download/${{ env.SODIUM_VERSION }}-RELEASE/libsodium-${{ env.SODIUM_VERSION }}.tar.gz" -o libsodium.tar.gz
          echo "${{ env.SODIUM_CHECKSUM }}  libsodium.tar.gz" | shasum -a 256 --check
          tar -xzf libsodium.tar.gz
          mv libsodium-${{ env.SODIUM_VERSION }} sodium-src

      - name: build shared
        run: |
          mkdir build-shared && cd build-shared
          ../sodium-src/configure \
            --enable-shared --disable-static \
            CFLAGS="${{ matrix.cflags }}" \
            LDFLAGS="${{ matrix.ldflags }}"
          make -j$(sysctl -n hw.logicalcpu)

      - name: build static
        run: |
          mkdir build-static && cd build-static
          ../sodium-src/configure \
            --disable-shared --enable-static \
            CFLAGS="${{ matrix.cflags }}" \
            LDFLAGS="${{ matrix.ldflags }}"
          make -j$(sysctl -n hw.logicalcpu)

      - name: prepare artifact
        run: |
          mkdir -p "${{ env.ARTIFACT_DIR }}/bin" "${{ env.ARTIFACT_DIR }}/lib"
          cp build-shared/src/libsodium/.libs/libsodium.dylib "${{ env.ARTIFACT_DIR }}/bin/libsodium.dylib"
          cp build-static/src/libsodium/.libs/libsodium.a "${{ env.ARTIFACT_DIR }}/lib/libsodium.a"

      - uses: actions/upload-artifact@v7
        with:
          name: libsodium-${{ matrix.rid }}
          path: ${{ env.ARTIFACT_DIR }}

  build-windows:
    name: build (${{ matrix.rid }})
    runs-on: windows-2025-vs2026
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            cmake_arch: x64
            msvc_arch: amd64

          - rid: win-arm64
            cmake_arch: ARM64
            msvc_arch: amd64_arm64

    steps:
      - name: setup msvc
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.msvc_arch }}

      - name: download source
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/jedisct1/libsodium/releases/download/${{ env.SODIUM_VERSION }}-RELEASE/libsodium-${{ env.SODIUM_VERSION }}.tar.gz" -OutFile libsodium.tar.gz

          $actual = (Get-FileHash libsodium.tar.gz -Algorithm SHA256).Hash.ToLower()
          $expected = "${{ env.SODIUM_CHECKSUM }}"
          if ($actual -ne $expected) {
            Write-Error "SHA256 mismatch. Expected: $expected  Got: $actual"
            exit 1
          }

          tar -xzf libsodium.tar.gz
          Rename-Item "libsodium-${{ env.SODIUM_VERSION }}" sodium-src

      - name: build (shared)
        shell: pwsh
        run: |
          msbuild sodium-src/builds/msvc/vs2022/libsodium/libsodium.vcxproj `
            /p:Configuration=DynRelease `
            /p:Platform=${{ matrix.cmake_arch }} `
            /p:PlatformToolset=v143 `
            /m

      - name: build (static)
        shell: pwsh
        run: |
          msbuild sodium-src/builds/msvc/vs2022/libsodium/libsodium.vcxproj `
            /p:Configuration=StaticRelease `
            /p:Platform=${{ matrix.cmake_arch }} `
            /p:PlatformToolset=v143 `
            /m

      - name: prepare artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force "${{ env.ARTIFACT_DIR }}/bin"
          New-Item -ItemType Directory -Force "${{ env.ARTIFACT_DIR }}/lib"

          Copy-Item "sodium-src/bin/${{ matrix.cmake_arch }}/Release/v143/dynamic/libsodium.dll" "${{ env.ARTIFACT_DIR }}/bin/libsodium.dll"
          Copy-Item "sodium-src/bin/${{ matrix.cmake_arch }}/Release/v143/dynamic/libsodium.dll" "${{ env.ARTIFACT_DIR }}/bin/sodium.dll"

          Copy-Item "sodium-src/bin/${{ matrix.cmake_arch }}/Release/v143/static/libsodium.lib" "${{ env.ARTIFACT_DIR }}/lib/libsodium.lib"
          Copy-Item "sodium-src/bin/${{ matrix.cmake_arch }}/Release/v143/static/libsodium.lib" "${{ env.ARTIFACT_DIR }}/lib/sodium.lib"

      - uses: actions/upload-artifact@v7
        with:
          name: libsodium-${{ matrix.rid }}
          path: ${{ env.ARTIFACT_DIR }}

  pack:
    needs:
      [
        build-linux-arm,
        build-linux-musl,
        build-linux-native,
        build-macos,
        build-windows,
      ]
    runs-on: ubuntu-latest

    permissions:
      checks: write
      contents: read

    steps:
      - name: checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: setup dotnet
        uses: actions/setup-dotnet@v5
        with:
          cache: true
          cache-dependency-path: ./**/packages.lock.json
          global-json-file: global.json

      - name: download artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: libsodium-*
          merge-multiple: false
          path: artifact

      - name: restore
        shell: pwsh
        run: |
          dotnet restore --locked-mode

          $artifact = Join-Path ${{ github.workspace }} "artifact"
          $output = Join-Path ${{ github.workspace }} "src"

          foreach ($runtime in @("linux-arm", "linux-arm64", "linux-x64", "linux-musl-arm", "linux-musl-arm64", "linux-musl-x64", "osx-arm64", "osx-x64", "win-arm64", "win-x64")) {
            foreach ($file in Get-ChildItem -Path ([System.IO.Path]::Combine($artifact, "libsodium-$runtime", "lib")) -Recurse -File) {
              New-Item -ItemType Directory -Path ([System.IO.Path]::Combine($output, "static", $runtime, "native")) -Force | Out-Null

              $destination = [System.IO.Path]::Combine($output, "static", $runtime, "native", $file.Name)
              Move-Item -Path $file.FullName -Destination $destination -Force

              Write-Host "[!] Moved ${file.FullName} to '$destination'"
            }

            foreach ($file in Get-ChildItem -Path ([System.IO.Path]::Combine($artifact, "libsodium-$runtime", "bin")) -Recurse -File) {
              New-Item -ItemType Directory -Path ([System.IO.Path]::Combine($output, "shared", $runtime, "native")) -Force | Out-Null

              $destination = [System.IO.Path]::Combine($output, "shared", $runtime, "native", $file.Name)
              Move-Item -Path $file.FullName -Destination $destination -Force

              Write-Host "[!] Moved ${file.FullName} to '$destination'"
            }
          }

      - name: pack
        run: dotnet build src/libsodium.nativeaot.csproj -c Release -p:LibSodiumVersion="${{ env.LIBSODIUM_VERSION }}" && dotnet pack src/libsodium.nativeaot.csproj -c Release -o dist --no-build -p:LibSodiumVersion="${{ env.LIBSODIUM_VERSION }}"

      - name: upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: libsodium-nuget
          path: dist

  publish:
    if: startsWith(github.ref, 'refs/heads/main') || startsWith(github.ref, 'refs/heads/develop')

    needs: [pack]
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: setup dotnet
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: nuget login
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: download artifact
        uses: actions/download-artifact@v8
        with:
          name: libsodium-nuget

      - name: push
        run: dotnet nuget push "*.nupkg" --api-key ${{steps.login.outputs.NUGET_API_KEY}} --source https://api.nuget.org/v3/index.json --skip-duplicate
